<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>沖縄県立高校入試 学校別データブック｜59校の定員・倍率・合格基準・追跡調査</title>
<meta name="description" content="沖縄県立高校59校・164学科の入試データを学校別に収録。学科・募集定員・特色選抜と一般選抜・内申と学力検査の比重・倍率・追跡調査（合格者/不合格者の偏差値・内申・当日点）を1校ずつ確認できる学校別データブック。">
<meta property="og:title" content="沖縄県立高校入試 学校別データブック">
<meta property="og:description" content="志望校のことを深く調べるための、学校別の入試データ年鑑。59校・164学科収録。">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F3F1E9;
  --paper-2:#EBE8DC;
  --card:#FBFAF5;
  --ink:#1D242D;
  --ink-2:#535B67;
  --ink-3:#8A8F97;
  --line:#D9D5C6;
  --line-2:#C7C2B0;
  --indigo:#24427C;
  --indigo-deep:#16294F;
  --indigo-pale:#E4E8F1;
  --shu:#BE3A2B;
  --a-north:#2F6B4F;
  --a-center:#A9640F;
  --a-south:#AE4A3C;
  --a-isles:#1F6786;
  --serif:"Shippori Mincho B1","Hiragino Mincho ProN",serif;
  --sans:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN",sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,monospace;
  --rad:10px;
  --maxw:1060px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:var(--sans);color:var(--ink);background:var(--paper);
  font-size:15px;line-height:1.75;letter-spacing:.015em;
  -webkit-text-size-adjust:100%;
}
/* faint paper texture via layered gradients */
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(1200px 500px at 85% -5%, rgba(36,66,124,.05), transparent 60%),
    repeating-linear-gradient(0deg, rgba(29,36,45,.014) 0 1px, transparent 1px 3px);
}
#app{position:relative;z-index:1}
a{color:var(--indigo)}
img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer}
::selection{background:var(--indigo);color:#fff}

/* ---------- top bar ---------- */
.topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(243,241,233,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.topbar-in{max-width:var(--maxw);margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:12px}
.brand{display:flex;align-items:baseline;gap:9px;text-decoration:none;color:var(--ink);min-width:0}
.brand b{font-family:var(--serif);font-weight:800;font-size:16px;letter-spacing:.06em;white-space:nowrap}
.brand small{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-links{margin-left:auto;display:flex;gap:14px}
.top-links a{font-size:12px;font-weight:700;color:var(--ink-2);text-decoration:none;letter-spacing:.05em}
.top-links a:hover{color:var(--indigo)}

/* ---------- cover / masthead ---------- */
.cover{max-width:var(--maxw);margin:0 auto;padding:44px 16px 8px;position:relative}
.cover-edition{
  margin-bottom:18px;
}
/* 学校名から直接選べるクイック索引 */
.quick-index{margin-top:13px;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.48);overflow:hidden}
.quick-index summary{cursor:pointer;padding:10px 13px;font-family:var(--sans);font-size:13px;font-weight:800;color:var(--indigo);letter-spacing:.04em;list-style:none}
.quick-index summary::-webkit-details-marker{display:none}
.quick-index summary::after{content:"＋";float:right;color:var(--ink-3)}
.quick-index[open] summary::after{content:"−"}
.school-quick{display:flex;flex-wrap:nowrap;gap:7px;padding:0 12px 13px;overflow-x:auto;scrollbar-width:thin}.school-quick a{flex:none}
.school-quick a{display:inline-flex;align-items:center;min-height:34px;padding:7px 11px;border:1px solid var(--line);border-radius:999px;background:var(--paper);color:var(--ink);font-size:12px;font-weight:750;text-decoration:none;transition:.18s}
.school-quick a:hover,.school-quick a:focus-visible{border-color:var(--indigo);background:var(--indigo);color:#fff;transform:translateY(-1px)}
.scard-title-overlay{position:absolute;left:0;right:0;bottom:0;z-index:2;padding:30px 14px 11px;background:linear-gradient(transparent,rgba(10,20,38,.86));color:#fff}
.scard-title-overlay b{font-family:var(--serif);font-size:22px;letter-spacing:.06em;text-shadow:0 1px 5px rgba(0,0,0,.35)}
.scard-title-overlay small{margin-left:5px;font-size:11px}
.photo-placeholder{position:absolute;inset:0;display:grid;place-items:center;background:linear-gradient(135deg,var(--paper-2),#e8e3d7);color:var(--ink-3);font-family:var(--serif);font-weight:800;font-size:22px;letter-spacing:.08em}
.shero-img.no-photo{display:grid;place-items:center;min-height:260px;background:linear-gradient(135deg,var(--paper-2),#e8e3d7);color:var(--ink-3);font-family:var(--serif);font-size:24px;font-weight:800;letter-spacing:.08em}

.cover-edition{
  display:inline-flex;align-items:center;gap:8px;margin-bottom:18px;
  animation:fadeUp .7s .05s both;
}
.hanko{
  width:52px;height:52px;border:2.5px solid var(--shu);border-radius:50%;
  color:var(--shu);font-family:var(--serif);font-weight:800;font-size:13px;line-height:1.15;
  display:flex;align-items:center;justify-content:center;text-align:center;
  transform:rotate(-6deg);letter-spacing:.05em;flex:none;
  background:radial-gradient(circle at 32% 28%, rgba(190,58,43,.09), transparent 62%);
}
.edition-meta{font-family:var(--mono);font-size:10.5px;letter-spacing:.13em;color:var(--ink-2);line-height:1.7}
.cover h1{
  font-family:var(--serif);font-weight:800;color:var(--ink);
  font-size:clamp(30px,6.4vw,52px);line-height:1.28;letter-spacing:.045em;
  animation:fadeUp .7s .12s both;
}
.cover h1 .h1-sub{display:block;font-size:.44em;font-weight:700;color:var(--indigo);letter-spacing:.24em;margin-bottom:8px}
.cover-rule{
  height:3px;background:var(--ink);margin:20px 0 16px;transform-origin:left;
  animation:ruleGrow .8s .3s both cubic-bezier(.2,.7,.2,1);position:relative;
}
.cover-rule::after{content:"";position:absolute;right:0;top:6px;width:38%;height:1px;background:var(--line-2)}
.cover-lead{max-width:640px;color:var(--ink-2);font-size:14.5px;animation:fadeUp .7s .34s both}
.cover-stats{display:flex;gap:26px;margin:22px 0 6px;flex-wrap:wrap;animation:fadeUp .7s .44s both}
.cstat b{font-family:var(--mono);font-weight:600;font-size:26px;color:var(--indigo);letter-spacing:.02em}
.cstat span{display:block;font-size:11px;font-weight:700;color:var(--ink-3);letter-spacing:.12em}

/* ---------- controls: search + index tabs ---------- */
.controls{
  position:sticky;top:47px;z-index:40;background:var(--paper);
  border-bottom:1px solid var(--line-2);
  box-shadow:0 6px 14px -12px rgba(29,36,45,.35);
}
.controls-in{max-width:var(--maxw);margin:0 auto;padding:12px 16px 0}
.searchbox{position:relative;max-width:430px}
.searchbox svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--ink-3)}
.searchbox input{
  width:100%;padding:10px 12px 10px 36px;font:inherit;font-size:15px;
  border:1.5px solid var(--line-2);border-radius:8px;background:var(--card);color:var(--ink);
  outline:none;transition:border-color .18s, box-shadow .18s;
}
.searchbox input:focus{border-color:var(--indigo);box-shadow:0 0 0 3px var(--indigo-pale)}
.tabs{display:flex;gap:4px;margin-top:12px;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;padding:0 2px;touch-action:pan-x;overscroll-behavior-x:contain;-webkit-overflow-scrolling:touch;align-items:stretch}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:none;touch-action:manipulation;
  position:relative;flex:none;background:var(--paper-2);color:var(--ink-2);border:1px solid var(--line-2);border-bottom:none;
  border-radius:9px 9px 0 0;padding:8px 15px 9px;font-size:12.5px;font-weight:700;letter-spacing:.06em;
  transition:transform .16s, background .16s, color .16s;
  border-top:3px solid var(--tabc,var(--ink-3));
  transform:none;
}
.tab:hover{transform:none}
.tab.on{background:var(--tabc,var(--indigo));border-color:var(--tabc,var(--indigo));color:#fff;transform:none}
.tab .n{font-family:var(--mono);font-size:10px;opacity:.75;margin-left:5px}
.tab.t-all{--tabc:var(--indigo-deep)}
.tab.t-北部{--tabc:var(--a-north)}
.tab.t-中部{--tabc:var(--a-center)}
.tab.t-南部{--tabc:var(--a-south)}
.tab.t-宮古八重山{--tabc:var(--a-isles)}

/* ---------- school grid ---------- */
.list-wrap{max-width:var(--maxw);margin:0 auto;padding:22px 16px 70px;min-height:60vh}
.result-line{font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--ink-3);margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:16px}
.scard{
  position:relative;display:flex;text-decoration:none;color:var(--ink);
  background:var(--card);border:1px solid var(--line);border-radius:var(--rad);overflow:hidden;
  box-shadow:0 1px 2px rgba(29,36,45,.06);
  transition:transform .22s cubic-bezier(.2,.7,.2,1), box-shadow .22s, border-color .22s;
  opacity:0;transform:translateY(14px);
}
.scard.in{opacity:1;transform:none;transition:transform .5s cubic-bezier(.2,.7,.2,1), box-shadow .22s, border-color .22s, opacity .5s}
.scard:hover{transform:translateY(-3px);box-shadow:0 12px 26px -14px rgba(22,41,79,.5);border-color:var(--line-2)}
.scard:active{transform:translateY(-1px)}
.spine{
  flex:none;width:26px;background:var(--ac,var(--indigo));color:#fff;
  display:flex;align-items:center;justify-content:center;
  writing-mode:vertical-rl;font-size:10.5px;font-weight:700;letter-spacing:.28em;padding:8px 0;
}
.scard-body{flex:1;min-width:0}
.scard-img{display:block;position:relative;aspect-ratio:16/9;overflow:hidden;background:var(--paper-2)}
.scard-img img{width:100%;height:100%;object-fit:cover;filter:saturate(.92);transition:transform .5s cubic-bezier(.2,.7,.2,1)}
.scard:hover .scard-img img{transform:scale(1.045)}
.scard-no{
  position:absolute;left:0;bottom:0;background:rgba(22,41,79,.88);color:#fff;
  font-family:var(--mono);font-size:10px;letter-spacing:.12em;padding:2px 9px 2px 8px;border-radius:0 6px 0 0;
}
.scard-info{padding:11px 13px 12px}
.scard-name{font-family:var(--serif);font-weight:800;font-size:19px;letter-spacing:.05em;line-height:1.3}
.scard-name small{font-size:11px;font-weight:700;color:var(--ink-3);margin-left:5px;letter-spacing:.08em}
.scard-meta{display:flex;gap:12px;margin-top:6px;font-size:11px;color:var(--ink-2)}
.scard-meta b{font-family:var(--mono);font-weight:600;color:var(--indigo)}
.empty{padding:60px 10px;text-align:center;color:var(--ink-3)}
.empty b{display:block;font-family:var(--serif);font-size:18px;color:var(--ink-2);margin-bottom:6px}

/* ---------- school page ---------- */
.spage{max-width:var(--maxw);margin:0 auto;padding:16px 16px 80px;animation:fadeUp .45s both}
.backlink{
  display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:var(--ink-2);
  font-size:12.5px;font-weight:700;letter-spacing:.06em;margin:4px 0 12px;
}
.backlink:hover{color:var(--indigo)}
.shero{
  position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--line-2);
  background:var(--indigo-deep);
}
.shero-img{aspect-ratio:16/7.4;min-height:210px;overflow:hidden}
.shero-img img{width:100%;height:100%;object-fit:cover;opacity:.92;animation:heroPan 14s ease-out both}
.shero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg, rgba(22,41,79,.06) 30%, rgba(16,24,42,.82) 100%)}
.shero-cap{position:absolute;left:0;right:0;bottom:0;z-index:2;padding:16px 18px;color:#fff;display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap}
.shero-no{font-family:var(--mono);font-size:11px;letter-spacing:.18em;opacity:.85;display:block;margin-bottom:2px}
.shero-name{font-family:var(--serif);font-weight:800;font-size:clamp(27px,5.4vw,40px);letter-spacing:.06em;line-height:1.2;text-shadow:0 2px 14px rgba(0,0,0,.4)}
.shero-name small{font-size:.42em;font-weight:700;opacity:.9;margin-left:8px;letter-spacing:.1em}
.achip{
  display:inline-block;background:var(--ac,var(--indigo));color:#fff;border-radius:5px;
  font-size:11px;font-weight:700;letter-spacing:.14em;padding:3px 10px;margin-bottom:8px;
}
.shero-stats{margin-left:auto;display:flex;gap:18px}
.shero-stats .cstat b{color:#fff;font-size:22px}
.shero-stats .cstat span{color:rgba(255,255,255,.72)}
.img-credit{font-size:10.5px;color:var(--ink-3);margin-top:7px;line-height:1.6}
.img-credit a{color:var(--ink-3)}
.memo{
  margin-top:14px;background:var(--indigo-pale);border:1px solid #C9D2E5;border-left:4px solid var(--indigo);
  border-radius:8px;padding:11px 14px;font-size:13.5px;color:var(--indigo-deep);
}
.warn-credit{
  margin-top:10px;background:#F7ECE2;border:1px solid #E4CDB4;border-left:4px solid var(--a-center);
  border-radius:8px;padding:10px 14px;font-size:12.5px;color:#6E4A17;
}

/* dept tabs */
.dtabs{display:flex;gap:8px;overflow-x:auto;padding:18px 2px 4px;scrollbar-width:none;position:sticky;top:47px;z-index:30;background:linear-gradient(180deg,var(--paper) 82%,transparent)}
.dtabs::-webkit-scrollbar{display:none}
.dtab{
  flex:none;border:1.5px solid var(--line-2);background:var(--card);color:var(--ink-2);
  border-radius:999px;padding:7px 16px;font-size:13px;font-weight:700;letter-spacing:.03em;
  transition:all .18s;
}
.dtab:hover{border-color:var(--indigo);color:var(--indigo)}
.dtab.on{background:var(--indigo);border-color:var(--indigo);color:#fff;box-shadow:0 5px 14px -6px rgba(36,66,124,.55)}
.dtab .tt{font-size:10px;opacity:.7;margin-left:4px}

/* dept panel */
.dept{animation:fadeUp .4s both}
.dept-head{display:flex;align-items:baseline;gap:12px;margin:16px 0 4px;flex-wrap:wrap}
.dept-head h2{font-family:var(--serif);font-weight:800;font-size:clamp(20px,4vw,26px);letter-spacing:.05em}
.badge{
  display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.08em;
  border:1px solid var(--line-2);color:var(--ink-2);border-radius:5px;padding:2px 8px;background:var(--card);
}
.badge.night{border-color:var(--indigo);color:var(--indigo)}
.sec{
  background:var(--card);border:1px solid var(--line);border-radius:var(--rad);
  margin-top:14px;overflow:hidden;box-shadow:0 1px 2px rgba(29,36,45,.05);
}
.sec-h{
  display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,#FDFCF8,var(--card));
}
.sec-h .kanji-no{
  font-family:var(--serif);font-weight:800;color:var(--indigo);font-size:13px;
  border:1.5px solid var(--indigo);border-radius:4px;width:24px;height:24px;flex:none;
  display:flex;align-items:center;justify-content:center;
}
.sec-h h3{font-family:var(--serif);font-weight:800;font-size:16.5px;letter-spacing:.08em}
.sec-h small{margin-left:auto;font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--ink-3)}
.sec-b{padding:15px 16px 17px}

/* 基準値 big numbers */
.kijun{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.knum{border:1px solid var(--line);border-radius:9px;padding:13px 14px 11px;background:#FDFCF8;position:relative}
.knum span{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--ink-2);display:block}
.knum b{font-family:var(--mono);font-weight:600;font-size:37px;color:var(--indigo-deep);line-height:1.15;letter-spacing:-.01em}
.knum small{font-size:11px;color:var(--ink-3);font-weight:700;margin-left:3px}
.posbar{margin-top:14px}
.posbar .pl{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--ink-3);letter-spacing:.08em;margin-bottom:4px}
.postrack{position:relative;height:8px;border-radius:99px;background:linear-gradient(90deg,var(--paper-2),var(--indigo-pale) 55%,#B9C6E2)}
.posdot{
  position:absolute;top:50%;width:15px;height:15px;border-radius:50%;
  background:var(--shu);border:2.5px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.35);
  transform:translate(-50%,-50%) scale(0);transition:left 1s cubic-bezier(.2,.8,.2,1), transform .5s .35s cubic-bezier(.3,1.5,.5,1);
}
.in .posdot{transform:translate(-50%,-50%) scale(1)}
.posnote{font-size:11px;color:var(--ink-3);margin-top:6px}

/* 募集・選抜 stat grid */
.stats4{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.st{border:1px solid var(--line);border-radius:9px;padding:11px 13px;background:#FDFCF8}
.st span{font-size:10.5px;font-weight:700;letter-spacing:.09em;color:var(--ink-2);display:block}
.st b{font-family:var(--mono);font-weight:600;font-size:21px;color:var(--ink)}
.st small{font-size:10.5px;color:var(--ink-3);font-weight:700}
.st .txt{font-family:var(--sans);font-size:13.5px;font-weight:700;line-height:1.5;display:block;margin-top:2px}
.wbar{margin-top:15px}
.wbar .wl{display:flex;justify-content:space-between;font-size:11.5px;font-weight:700;color:var(--ink-2);margin-bottom:5px}
.wtrack{display:flex;height:26px;border-radius:7px;overflow:hidden;border:1px solid var(--line-2)}
.wseg{display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--mono);font-size:11px;letter-spacing:.06em;min-width:0;width:0;transition:width 1s cubic-bezier(.2,.8,.2,1)}
.wseg.nai{background:var(--indigo)}
.wseg.gaku{background:var(--a-south)}
.qbar{margin-top:15px}
.qtrack{position:relative;height:18px;border-radius:6px;background:var(--paper-2);border:1px solid var(--line-2);overflow:hidden}
.qfill{height:100%;width:0;background:repeating-linear-gradient(-45deg,var(--indigo),var(--indigo) 6px,#37569B 6px 12px);transition:width 1s cubic-bezier(.2,.8,.2,1)}
.qlab{font-size:11.5px;color:var(--ink-2);margin-top:5px}
.qlab b{color:var(--indigo)}

/* tables */
.tscroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table.dt{width:100%;border-collapse:collapse;font-size:13px;min-width:430px}
table.dt th{
  font-size:11px;letter-spacing:.08em;color:var(--ink-2);font-weight:700;text-align:left;
  border-bottom:2px solid var(--ink);padding:6px 8px;white-space:nowrap;
}
table.dt td{border-bottom:1px solid var(--line);padding:8px;vertical-align:middle}
table.dt tr:last-child td{border-bottom:none}
td.num,th.num{text-align:right;font-family:var(--mono);font-weight:600;font-variant-numeric:tabular-nums}
.pill{display:inline-block;font-size:11px;font-weight:700;border-radius:99px;padding:1px 10px;letter-spacing:.05em}
.pill.pass{background:#E2EDE6;color:#1F5A3C}
.pill.fail{background:#F3E3E1;color:#8C3127}
.pill.sel-t{background:var(--indigo-pale);color:var(--indigo-deep)}
.pill.sel-i{background:var(--paper-2);color:var(--ink-2)}
.rbar-wrap{position:relative;height:20px;min-width:130px}
.rbar-track{position:absolute;top:9px;left:0;right:0;height:2px;background:var(--line-2);border-radius:2px}
.rbar-range{position:absolute;top:7px;height:6px;border-radius:4px;background:var(--indigo-pale);border:1px solid #B9C6E2;width:0;transition:width .8s cubic-bezier(.2,.8,.2,1), left .8s}
.rbar-avg{position:absolute;top:4px;width:3px;height:12px;border-radius:2px;background:var(--shu)}
.ratio-cell{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.ratio-bar{height:8px;border-radius:99px;background:var(--indigo);opacity:.85;width:0;transition:width .9s cubic-bezier(.2,.8,.2,1)}
.ratio-bar.low{background:var(--ink-3)}
.over1{color:var(--shu);font-weight:700}
.note{font-size:11.5px;color:var(--ink-3);margin-top:10px;line-height:1.7}
.scope-note{
  margin-top:12px;font-size:12.5px;color:#6E4A17;background:#F7EFE2;border:1px solid #E7D7B8;
  border-radius:8px;padding:10px 13px;
}
.nodata{color:var(--ink-3);font-size:13px;padding:6px 0}

/* details disclosure */
details.dx{border-top:1px dashed var(--line-2);margin-top:14px;padding-top:4px}
details.dx summary{
  cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px;
  font-size:13px;font-weight:700;color:var(--indigo);padding:8px 0;user-select:none;
}
details.dx summary::-webkit-details-marker{display:none}
details.dx summary::before{content:"▸";transition:transform .2s;font-size:11px}
details.dx[open] summary::before{transform:rotate(90deg)}
details.dx .dx-in{padding:2px 0 8px}

/* official admission details (optional data) */
.od-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:12px}
.od-list{padding-left:20px;font-size:13px}
.od-list li{margin:3px 0}
.od-sub{font-weight:700;font-size:12.5px;color:var(--indigo-deep);margin:12px 0 4px;letter-spacing:.06em}
.od-empty{color:var(--ink-3);font-size:12.5px}
.od-links{display:grid;gap:8px}
.od-links a{
  display:block;border:1px solid var(--line-2);border-radius:8px;padding:9px 13px;text-decoration:none;
  background:#FDFCF8;font-size:13px;
}
.od-links a small{display:block;color:var(--ink-3);font-size:11px}
.od-qual{display:inline-block;background:var(--indigo-pale);color:var(--indigo-deep);border-radius:4px;font-size:11px;padding:1px 7px;margin:2px 3px 0 0}
.od-meta{color:var(--ink-3)}
table.od-table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:400px}
table.od-table th{font-size:11px;color:var(--ink-2);border-bottom:2px solid var(--ink);text-align:left;padding:5px 7px}
table.od-table td{border-bottom:1px solid var(--line);padding:6px 7px;vertical-align:top}

/* about page */
.about{max-width:820px;margin:0 auto;padding:30px 16px 90px;animation:fadeUp .45s both}
.about h1{font-family:var(--serif);font-weight:800;font-size:clamp(24px,5vw,32px);letter-spacing:.06em;margin-bottom:6px}
.about h2{font-family:var(--serif);font-weight:800;font-size:19px;letter-spacing:.06em;margin:34px 0 10px;padding-left:12px;border-left:4px solid var(--indigo)}
.about p{margin:8px 0;font-size:14px;color:var(--ink-2)}
.about li{font-size:14px;color:var(--ink-2);margin:5px 0}
.about ul{padding-left:22px}
.credit-table{font-size:12px}
.credit-table td{padding:7px 8px}

/* footer */
footer{border-top:1px solid var(--line-2);background:var(--paper-2)}
.foot-in{max-width:var(--maxw);margin:0 auto;padding:26px 16px 34px;font-size:12px;color:var(--ink-2);line-height:1.9}
.foot-in .fbrand{font-family:var(--serif);font-weight:800;font-size:15px;color:var(--ink);letter-spacing:.06em;margin-bottom:6px}
.foot-in a{color:var(--ink-2)}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes ruleGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes heroPan{from{transform:scale(1.07)}to{transform:scale(1)}}

@media (max-width:640px){
  body{font-size:14.5px}
  .cover{padding-top:32px}
  .shero-stats{display:none}
  .kijun{grid-template-columns:1fr}
  .topbar-in{padding:9px 14px}
  .brand small{display:none}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-delay:0ms !important;transition-duration:.01ms !important}
  html{scroll-behavior:auto}
}

/* 最終レイアウト調整 */
.controls-in{padding-bottom:16px}
.quick-index{margin-bottom:0}
.list-wrap{padding-top:28px}
.scard-body{display:flex;flex-direction:column}
.scard-img{flex:none}
.scard-no{
  left:auto;right:10px;top:10px;bottom:auto;
  border-radius:999px;padding:3px 8px 3px 9px;
  background:rgba(22,41,79,.86);z-index:3;
}
.scard-title-overlay{padding:42px 16px 14px}
.scard-info{
  display:flex;align-items:center;min-height:54px;
  padding:13px 16px 14px;box-sizing:border-box;
}
.scard-meta{margin-top:0;display:flex;align-items:center;flex-wrap:wrap;gap:7px 14px;line-height:1.5}
.foot-operator{margin-top:9px;font-weight:700;color:var(--ink)}
.foot-operator a{color:var(--indigo);text-underline-offset:3px}
@media (max-width:640px){
  .controls-in{padding-bottom:12px}
  .list-wrap{padding-top:22px}
  .scard-title-overlay{padding:38px 14px 12px}
  .scard-info{min-height:50px;padding:12px 14px 13px}
}

</style>

<script>
"use strict";
/* =====================================================================
   沖縄県立高校入試 学校別データブック
   データ: schools-data.js（入試ナビと同一の一次データを収録）
   任意データ: data/admission-details.js ほかを配置すると
   「出願要件・検査内容（学校別公式資料）」の欄が自動で表示されます。
===================================================================== */

const AREAS = ["北部","中部","南部","宮古・八重山"];
const AREA_CLASS = {"北部":"t-北部","中部":"t-中部","南部":"t-南部","宮古・八重山":"t-宮古八重山"};
const AREA_VAR = {"北部":"var(--a-north)","中部":"var(--a-center)","南部":"var(--a-south)","宮古・八重山":"var(--a-isles)"};

const ADM = window.ADMISSION_DETAILS || {};
const ACH_RECORDS_RAW = (window.ACHIEVEMENT_RANKS && window.ACHIEVEMENT_RANKS.records) || [];
const ACH_RECORDS = Array.isArray(ACH_RECORDS_RAW) ? ACH_RECORDS_RAW : Object.values(ACH_RECORDS_RAW);
const ACH_BY_ID = Object.fromEntries(ACH_RECORDS.map(x=>[x.achievementId||x.achievementRankId,x]));
const SRC_LIST = window.ADMISSION_SOURCES || [];
const SRC_BY_ID = Object.fromEntries(SRC_LIST.map(x=>[x.source_id,x]));

/* ---------- helpers ---------- */
const esc = s => String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const num = (v,d="—") => (v===null||v===undefined||Number.isNaN(v)) ? d : String(v);
const kataToHira = s => s.replace(/[\u30a1-\u30f6]/g, c=>String.fromCharCode(c.charCodeAt(0)-0x60));
const norm = s => kataToHira(String(s||"").toLowerCase());

/* ---------- build school index ---------- */
const CREDIT_BY_SCHOOL = {};
IMAGE_CREDITS.forEach(c=>{ CREDIT_BY_SCHOOL[c.school]=c; });

const SCHOOL_LIST = (()=>{
  const map = new Map();
  SCHOOLS.forEach(s=>{
    if(!map.has(s.name)) map.set(s.name,{name:s.name,area:s.area,depts:[]});
    map.get(s.name).depts.push(s);
  });
  const arr=[...map.values()];
  arr.forEach((sc,idx)=>{
    const c = CREDIT_BY_SCHOOL[sc.name];
    sc.no = c?.no ?? (idx+1);
    sc.img = c?.file ? "images/"+c.file : null;
    sc.credit = c || null;
    const devs = sc.depts.map(d=>d.y?.["2025"]?.dev).filter(v=>v!=null);
    sc.devMin = devs.length?Math.min(...devs):null;
    sc.devMax = devs.length?Math.max(...devs):null;
    sc.capTotal = sc.depts.reduce((a,d)=> a + ((TOKU[d.id]?.[0])||0), 0);
    sc.hasNight = sc.depts.some(d=>d.track==="定時制");
  });
  arr.sort((a,b)=>a.no-b.no);
  return arr;
})();

const ALL_DEVS = SCHOOLS.map(s=>s.y?.["2025"]?.dev).filter(v=>v!=null);
const DEV_MIN = Math.min(...ALL_DEVS), DEV_MAX = Math.max(...ALL_DEVS);

/* ---------- state ---------- */
let state = { area:"すべて", q:"" };

/* ---------- reveal / animation observer ---------- */
let io=null;
function observeReveals(root){
  const targets = root.querySelectorAll("[data-reveal]");
  if(io) io.disconnect();
  io = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(!e.isIntersecting) return;
      const el=e.target;
      el.classList.add("in");
      el.querySelectorAll("[data-w]").forEach(b=>{ b.style.width=b.dataset.w; });
      el.querySelectorAll("[data-left]").forEach(b=>{ b.style.left=b.dataset.left; });
      el.querySelectorAll("[data-count]").forEach(n=>countUp(n));
      io.unobserve(el);
    });
  },{threshold:.18});
  targets.forEach(t=>io.observe(t));
}
function countUp(el){
  if(el.dataset.done) return; el.dataset.done="1";
  const target=parseFloat(el.dataset.count);
  if(Number.isNaN(target)){ return; }
  const isInt = Number.isInteger(target);
  const dur=850, t0=performance.now();
  const tick=t=>{
    const p=Math.min(1,(t-t0)/dur), e=1-Math.pow(1-p,3);
    const v=target*e;
    el.textContent = isInt ? Math.round(v) : v.toFixed(1);
    if(p<1) requestAnimationFrame(tick); else el.textContent = isInt?target:target.toFixed(1);
  };
  if(matchMedia("(prefers-reduced-motion: reduce)").matches){ el.textContent=isInt?target:target.toFixed(1); return; }
  requestAnimationFrame(tick);
}

/* ---------- router ---------- */
function route(){
  const h = decodeURIComponent(location.hash||"#/");
  const view = document.getElementById("view");
  window.scrollTo(0,0);
  let m;
  if((m = h.match(/^#\/s\/(.+?)(?:\/(\d+))?$/))){
    const sc = SCHOOL_LIST.find(x=>x.name===m[1]);
    if(sc){ renderSchool(view, sc, m[2]?+m[2]:0); return; }
  }
  if(h.startsWith("#/about")){ renderAbout(view); return; }
  renderHome(view);
}
window.addEventListener("hashchange", route);

/* ---------- HOME ---------- */
function renderHome(view){
  document.title = "沖縄県立高校入試 学校別データブック｜59校の定員・倍率・合格基準・追跡調査";
  view.innerHTML = `
  <section class="cover">
    <div class="cover-edition">
      <div class="edition-meta">SCHOOL DATA BOOK<br>令和8年度入試データ収録</div>
    </div>
    <h1><span class="h1-sub">沖縄県立高校入試</span>学校別データブック</h1>
    <div class="cover-rule"></div>
    <p class="cover-lead">志望校のことを、1校ずつ深く。学科・募集定員・特色選抜と一般選抜・内申と学力検査の比重・倍率・追跡調査を、県立高校ごとにまとめた入試データ年鑑です。</p>
    <div class="cover-stats">
      <div class="cstat"><b>${SCHOOL_LIST.length}</b><span>収録校</span></div>
      <div class="cstat"><b>${SCHOOLS.length}</b><span>学科・コース</span></div>
      <div class="cstat"><b>4</b><span>地区</span></div>
    </div>
  </section>
  <div class="controls">
    <div class="controls-in">
      <div class="searchbox">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.6-3.6"/></svg>
        <input id="q" type="search" placeholder="学校名・学科名でさがす（例：名護 / 理数）" value="${esc(state.q)}" autocomplete="off">
      </div>
      <div class="tabs" id="tabs"></div>
      <details class="quick-index" open>
        <summary>学校名から選ぶ</summary>
        <div class="school-quick" id="schoolQuick"></div>
      </details>
    </div>
  </div>
  <section class="list-wrap">
    <div class="result-line" id="resultLine"></div>
    <div class="grid" id="grid"></div>
  </section>`;

  const tabsEl = view.querySelector("#tabs");
  const tabDefs = ["すべて",...AREAS];
  tabsEl.innerHTML = tabDefs.map(a=>{
    const n = a==="すべて" ? SCHOOL_LIST.length : SCHOOL_LIST.filter(s=>s.area===a).length;
    const cls = a==="すべて" ? "t-all" : AREA_CLASS[a];
    return `<button class="tab ${cls} ${state.area===a?"on":""}" data-area="${esc(a)}">${esc(a)}<span class="n">${n}</span></button>`;
  }).join("");
  tabsEl.addEventListener("click",e=>{
    const b=e.target.closest(".tab"); if(!b) return;
    state.area=b.dataset.area;
    tabsEl.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on",t.dataset.area===state.area));
    drawGrid(view);
  });
  view.querySelector("#q").addEventListener("input",e=>{ state.q=e.target.value; drawGrid(view); });
  drawGrid(view);
}

function drawGrid(view){
  const grid=view.querySelector("#grid"), line=view.querySelector("#resultLine"), quick=view.querySelector("#schoolQuick");
  const q=norm(state.q.trim());
  let list=SCHOOL_LIST.filter(s=> state.area==="すべて"||s.area===state.area);
  if(q){
    list=list.filter(s=> norm(s.name).includes(q) || s.depts.some(d=>norm(d.dept).includes(q)) );
  }
  line.textContent = `INDEX — ${list.length} SCHOOLS${state.area!=="すべて"?" / "+state.area:""}`;
  if(quick) quick.innerHTML = list.map(s=>`<a href="#/s/${encodeURIComponent(s.name)}">${esc(s.name)}高校</a>`).join("") || `<span class="nodata">該当する学校がありません</span>`;
  grid.innerHTML = list.map(s=>{
    const band = s.devMin==null?"—":(s.devMin===s.devMax?s.devMin:`${s.devMin}–${s.devMax}`);
    return `<a class="scard" href="#/s/${encodeURIComponent(s.name)}" style="--ac:${AREA_VAR[s.area]}">
      <span class="spine">${esc(s.area)}</span>
      <span class="scard-body">
        <span class="scard-img">${s.img?`<img loading="lazy" src="${esc(s.img)}" alt="${esc(s.name)}高校">`:`<span class="photo-placeholder">SCHOOL DATA</span>`}<span class="scard-no">No.${String(s.no).padStart(2,"0")}</span><span class="scard-title-overlay"><b>${esc(s.name)}</b><small>高校</small></span></span>
        <span class="scard-info"><span class="scard-meta"><span>学科 <b>${s.depts.length}</b></span><span>基準偏差値 <b>${band}</b></span>${s.hasNight?`<span class="badge night">定時制あり</span>`:""}</span></span>
      </span>
    </a>`;
  }).join("") || `<div class="empty"><b>該当する学校がありません</b>検索語や地区タブを変えてみてください。</div>`;
  // stagger in
  const cards=[...grid.querySelectorAll(".scard")];
  if(matchMedia("(prefers-reduced-motion: reduce)").matches){ cards.forEach(c=>c.classList.add("in")); return; }
  cards.forEach((c,i)=> setTimeout(()=>c.classList.add("in"), Math.min(i,18)*36) );
}

/* ---------- SCHOOL PAGE ---------- */
function renderSchool(view, sc, deptIdx){
  document.title = `${sc.name}高校の入試データ｜沖縄県立高校入試 学校別データブック`;
  const c=sc.credit;
  const licenseWarn = !!c && (/未確認|許諾/.test((c.rights||"")+(c.note||"")) || ["久米島","宮古総合実業"].includes(sc.name));
  const memoTexts=[...new Set(sc.depts.map(d=>SCHOOL_MEMO[d.id]).filter(Boolean))];
  view.innerHTML = `
  <article class="spage" style="--ac:${AREA_VAR[sc.area]}">
    <a class="backlink" href="#/">← 学校一覧にもどる</a>
    <div class="shero">
      ${sc.img?`<div class="shero-img"><img src="${esc(sc.img)}" alt="${esc(sc.name)}高校の校舎"></div>`:`<div class="shero-img no-photo">${esc(sc.name)}高等学校</div>`}
      <div class="shero-cap">
        <div>
          <span class="achip">${esc(sc.area)}</span>
          <span class="shero-no">SCHOOL No.${String(sc.no).padStart(2,"0")} / ${String(SCHOOL_LIST.length).padStart(2,"0")}</span>
          <h1 class="shero-name">${esc(sc.name)}<small>高等学校</small></h1>
        </div>
        <div class="shero-stats">
          <div class="cstat"><b>${sc.depts.length}</b><span>学科・コース</span></div>
          <div class="cstat"><b>${sc.capTotal||"—"}</b><span>募集定員 合計</span></div>
          <div class="cstat"><b>${sc.devMin==null?"—":(sc.devMin===sc.devMax?sc.devMin:sc.devMin+"–"+sc.devMax)}</b><span>基準偏差値</span></div>
        </div>
      </div>
    </div>
    ${c?`<p class="img-credit">校舎写真の出典：${esc(c.sourceType)}${c.pageUrl?` — <a href="${esc(c.pageUrl)}" target="_blank" rel="noopener">出典ページ</a>`:""}（ライセンス条件は出典ページの記載に従います）</p>`:""}
    ${licenseWarn?`<div class="warn-credit">この学校の写真はオープンライセンスを確認できていない候補画像です。公開サイトへ掲載する前に、画像提供元または学校へ利用許諾をご確認ください。</div>`:""}
    ${memoTexts.map(t=>`<div class="memo">${esc(t)}</div>`).join("")}
    <nav class="dtabs" id="dtabs" aria-label="学科をえらぶ">
      ${sc.depts.map((d,i)=>`<button class="dtab ${i===deptIdx?"on":""}" data-i="${i}">${esc(d.dept)}${d.track==="定時制"?`<span class="tt">定</span>`:""}</button>`).join("")}
    </nav>
    <div id="deptPanel"></div>
  </article>`;
  view.querySelector("#dtabs").addEventListener("click",e=>{
    const b=e.target.closest(".dtab"); if(!b) return;
    view.querySelectorAll(".dtab").forEach(t=>t.classList.remove("on"));
    b.classList.add("on");
    drawDept(view, sc, +b.dataset.i);
    history.replaceState(null,"",`#/s/${encodeURIComponent(sc.name)}/${b.dataset.i}`);
  });
  drawDept(view, sc, Math.min(deptIdx, sc.depts.length-1));
}

function drawDept(view, sc, i){
  const d=sc.depts[i], y=d.y?.["2025"]||{}, tk=TOKU[d.id]||[null,null,null,null];
  const [cap, tokuPct, waku, weight] = tk;
  const panel=view.querySelector("#deptPanel");
  const isDummy = !!y.dummy;
  let secNo=0;
  const KANJI="一二三四五六七八九".split("");
  const secH=(title,sub="")=>`<div class="sec-h"><span class="kanji-no">${KANJI[secNo++]}</span><h3>${title}</h3>${sub?`<small>${sub}</small>`:""}</div>`;

  /* 基準値 */
  const kijunHtml = `
  <section class="sec" data-reveal>
    ${secH("合格基準のめやす","2025年度・模試追跡調査ベース")}
    <div class="sec-b">
      ${y.dev==null?`<p class="nodata">この学科の合格基準データは未収録です（新設・改編学科など）。</p>`:`
      <div class="kijun">
        <div class="knum"><span>基準偏差値</span><b data-count="${y.dev}">0</b></div>
        <div class="knum"><span>基準内申点</span><b data-count="${y.nai}">0</b><small>/ 165点</small></div>
      </div>
`}
    </div>
  </section>`;

  /* 募集と選抜方式 */
  const wm = weight ? weight.split(":") : null;
  const wNai = wm?parseFloat(wm[0]):null, wGaku = wm?parseFloat(wm[1]):null;
  const wNaiPct = wm ? (wNai/(wNai+wGaku))*100 : null;
  const bosyuHtml = `
  <section class="sec" data-reveal>
    ${secH("募集と選抜のしくみ","令和8年度公式資料より")}
    <div class="sec-b">
      <div class="stats4">
        <div class="st"><span>募集定員</span><b>${num(cap)}</b><small> 人</small></div>
        <div class="st"><span>特色選抜の割合</span><b>${num(tokuPct)}</b><small> %（定員に対して）</small></div>
        <div class="st"><span>特別枠</span><span class="txt">${waku==null?"—":esc(WAKU_TXT[waku])}</span></div>
        <div class="st"><span>一般選抜の比重</span><b style="font-size:19px">${weight?esc(weight):"—"}</b><small>（内申：学力検査）</small></div>
      </div>
      ${wm?`
      <div class="wbar">
        <div class="wl"><span>調査書（内申）</span><span>学力検査等</span></div>
        <div class="wtrack">
          <div class="wseg nai" data-w="${wNaiPct}%">${wNai}</div>
          <div class="wseg gaku" data-w="${100-wNaiPct}%">${wGaku}</div>
        </div>
      </div>`:""}
      ${tokuPct!=null&&cap!=null?`
      <div class="qbar">
        <div class="qtrack"><div class="qfill" data-w="${tokuPct}%"></div></div>
        <p class="qlab">定員${cap}人のうち、最大 <b>${Math.round(cap*tokuPct/100)}人</b> までが特色選抜で合格できます（残りは一般選抜）。</p>
      </div>`:""}
      ${y.specialQuota?`<p class="note">※ この学科の特色選抜割合には「${esc(y.specialQuota)}」の公式表記があります。</p>`:""}
      <p class="note">出典：${esc(TOKU_SRC)}</p>
    </div>
  </section>`;

  /* 志願状況・倍率 */
  const ap=y.applicationStatus2025;
  const ratioRow=(label,r,selClass)=>{
    if(!r) return "";
    const ratio=r.ratio;
    const w = ratio==null?0:Math.min(100, ratio/3*100);
    return `<tr>
      <td><span class="pill ${selClass}">${label}</span></td>
      <td class="num">${num(r.capacity)}</td>
      <td class="num">${num(r.applicants)}</td>
      <td class="num">${r.difference==null?"—":(r.difference>0?"+":"")+r.difference}</td>
      <td><div class="ratio-cell"><div class="ratio-bar ${ratio!=null&&ratio<1?"low":""}" data-w="${w}%"></div><span class="num ${ratio!=null&&ratio>=1?"over1":""}" style="min-width:44px;text-align:right">${ratio==null?"—":ratio.toFixed(2)}</span></div></td>
    </tr>`;
  };
  const bairituHtml = `
  <section class="sec" data-reveal>
    ${secH("倍率・志願状況","2025年度")}
    <div class="sec-b">
      ${ap?`
      <div class="tscroll"><table class="dt">
        <thead><tr><th>選抜</th><th class="num">募集人員</th><th class="num">志願者</th><th class="num">差</th><th style="text-align:right">倍率</th></tr></thead>
        <tbody>
          ${ratioRow("特色選抜",ap.special,"sel-t")}
          ${ratioRow("一般選抜",ap.general,"sel-i")}
          ${ratioRow("2次募集",ap.second,"sel-i")}
        </tbody>
      </table></div>
      <p class="note">倍率1.00以上（志願者が募集人員を超過）は<span class="over1">赤字</span>で表示。2次募集の「—」は実施なし・非公表を含みます。</p>
      `:( y.rT!=null||y.rI!=null ? `
      <div class="stats4">
        <div class="st"><span>特色選抜 倍率</span><b class="${y.rT>=1?"over1":""}">${num(y.rT)}</b><small> 倍</small></div>
        <div class="st"><span>一般選抜 倍率</span><b class="${y.rI>=1?"over1":""}">${num(y.rI)}</b><small> 倍</small></div>
      </div>` : `<p class="nodata">2025年度の志願状況データは未収録です。</p>` )}
    </div>
  </section>`;

  /* 追跡調査 */
  const rec=y.rec||[];
  const td=y.trackingDetail;
  const recRows = rec.map(r=>`<tr>
      <td><span class="pill ${r.sel==="特色"?"sel-t":"sel-i"}">${esc(r.sel)}</span></td>
      <td><span class="pill ${r.res==="合格"?"pass":"fail"}">${esc(r.res)}</span></td>
      <td class="num">${num(r.dev)}</td>
      <td class="num">${num(r.nai)}</td>
      <td class="num">${num(r.score)}</td>
    </tr>`).join("");
  const rangeRow=(label,metric,o)=>{
    if(!o || o.count==null) return "";
    const domain = metric==="dev" ? [25,75] : metric==="nai" ? [40,165] : [30,270];
    const pct=v=> Math.max(0,Math.min(100,(v-domain[0])/(domain[1]-domain[0])*100));
    const l=pct(o.min), w=pct(o.max)-pct(o.min), a=pct(o.avg);
    return `<tr>
      <td>${label}</td>
      <td class="num">${o.count}人</td>
      <td class="num">${num(o.min)}</td>
      <td class="num" style="color:var(--shu);font-weight:700">${num(o.avg)}</td>
      <td class="num">${num(o.max)}</td>
      <td><div class="rbar-wrap"><div class="rbar-track"></div><div class="rbar-range" data-left="${l}%" data-w="${w}%" style="left:${l}%"></div><span class="rbar-avg" style="left:${a}%"></span></div></td>
    </tr>`;
  };
  const detailBlock=(selKey,selLabel)=>{
    const s=td?.[selKey]; if(!s) return "";
    const metrics=[["dev","偏差値"],["nai","内申点"],["score","当日点"]];
    const rows = metrics.map(([k,lab])=>[
      rangeRow(`<span class="pill pass">合格</span> ${lab}`,k,s.pass?.[k]),
      rangeRow(`<span class="pill fail">不合格</span> ${lab}`,k,s.fail?.[k]),
    ].join("")).join("");
    if(!rows.trim()) return "";
    return `<div class="od-sub">${selLabel}</div>
    <div class="tscroll"><table class="dt" style="min-width:520px">
      <thead><tr><th>区分</th><th class="num">人数</th><th class="num">最小</th><th class="num">平均</th><th class="num">最大</th><th>分布（最小—最大、<span style="color:var(--shu)">｜</span>＝平均）</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
  };
  const tsuisekiHtml = `
  <section class="sec" data-reveal>
    ${secH("追跡調査","2025年度・受験者の平均値")}
    <div class="sec-b">
      ${rec.length?`
      <div class="tscroll"><table class="dt">
        <thead><tr><th>選抜</th><th>結果</th><th class="num">偏差値 平均</th><th class="num">内申 平均</th><th class="num">当日点 平均</th></tr></thead>
        <tbody>${recRows}</tbody>
      </table></div>
      <p class="note">模試を受けた受験者の追跡調査にもとづく平均値です。「—」はデータ数が少なく非公表・未集計の項目。</p>
      `:`<p class="nodata">この学科の追跡調査データは未収録です。</p>`}
      ${td?`<details class="dx"><summary>くわしい分布を見る（最小・平均・最大）</summary><div class="dx-in">
        ${detailBlock("special","特色選抜")}
        ${detailBlock("general","一般選抜")}
      </div></details>`:""}
      ${y.dataScopeNote?`<div class="scope-note">${esc(y.dataScopeNote)}</div>`:""}
    </div>
  </section>`;

  /* 出願要件・検査内容（公式資料・任意データ） */
  const officialHtml = ADM[d.id] ? `
  <section class="sec" data-reveal>
    ${secH("出願要件・検査内容","学校別公式資料より")}
    <div class="sec-b">${officialDetailHtml(d)}</div>
  </section>` : "";

  /* 旧学科の参考データ */
  const legacy = LEGACY_REFERENCE_DATA[sc.name];
  const legacyHtml = (legacy&&i===0)?`
  <section class="sec" data-reveal>
    ${secH("参考：旧学科・区分別の記録")}
    <div class="sec-b">
      ${legacy.map(L=>`
        <div class="od-sub">${esc(L.department)}（基準偏差値 ${num(L.dev)}・基準内申 ${num(L.nai)}${L.note?`・${esc(L.note)}`:""}）</div>
        ${(L.rec&&L.rec.length)?`<div class="tscroll"><table class="dt"><thead><tr><th>選抜</th><th>結果</th><th class="num">偏差値 平均</th><th class="num">内申 平均</th><th class="num">当日点 平均</th></tr></thead><tbody>
          ${L.rec.map(r=>`<tr><td><span class="pill ${r.sel==="特色"?"sel-t":"sel-i"}">${esc(r.sel)}</span></td><td><span class="pill ${r.res==="合格"?"pass":"fail"}">${esc(r.res)}</span></td><td class="num">${num(r.dev)}</td><td class="num">${num(r.nai)}</td><td class="num">${num(r.score)}</td></tr>`).join("")}
        </tbody></table></div>`:""}
      `).join("")}
      <p class="note">現在の学科・コース区分と対応しない過去の集計です。参考としてご覧ください。</p>
    </div>
  </section>`:"";

  panel.innerHTML = `<div class="dept">
    <div class="dept-head">
      <h2>${esc(d.dept)}</h2>
      <span class="badge">${esc(d.track)}</span>
      ${y.verified?`<span class="badge" style="border-color:var(--a-north);color:var(--a-north)">一次資料照合済み</span>`:""}
    </div>
    ${isDummy?`<section class="sec" data-reveal><div class="sec-b"><p class="nodata">この学科・区分は新設・改編などのため、2025年度の数値データが存在しません。募集定員などの基本情報のみ掲載しています。</p>
      <div class="stats4" style="margin-top:10px">
        <div class="st"><span>募集定員</span><b>${num(cap)}</b><small> 人</small></div>
        <div class="st"><span>特色選抜の割合</span><b>${num(tokuPct)}</b><small> %</small></div>
        <div class="st"><span>特別枠</span><span class="txt">${waku==null?"—":esc(WAKU_TXT[waku])}</span></div>
        <div class="st"><span>一般選抜の比重</span><b style="font-size:19px">${weight?esc(weight):"—"}</b></div>
      </div><p class="note" style="margin-top:12px">出典：${esc(TOKU_SRC)}</p></div></section>`
    : kijunHtml + bosyuHtml + bairituHtml + tsuisekiHtml}
    ${officialHtml}
    ${legacyHtml}
  </div>`;
  observeReveals(panel);
}

/* ---------- official admission details renderer (optional data files) ---------- */
function odTestText(v){
  if(!v) return "";
  if(typeof v==="string") return v;
  const a=[];
  if(v.required===true)a.push("必須");
  if(v.required===false)a.push("実施なし／対象外");
  ["name","format"].forEach(k=>v[k]&&a.push(v[k]));
  if(v.points!=null)a.push(v.points+"点");
  if(v.duration)a.push(v.duration);
  if(v.length)a.push("字数："+v.length);
  if(v.topic)a.push("テーマ："+v.topic);
  if(v.theme)a.push("テーマ："+v.theme);
  ["details","evaluation","treatment","notes"].forEach(k=>v[k]&&a.push(v[k]));
  return a.join("／");
}
function odScoring(scoring){
  if(!Array.isArray(scoring)||!scoring.length) return `<p class="od-empty">配点の詳細は公式資料で未確認または未公表です。</p>`;
  const rows=[];
  scoring.forEach(x=>{
    rows.push(`<tr><td>${esc(x.item||x.name||"項目")}</td><td>${x.points==null?"—":esc(x.points)+"点"}</td><td>${esc(x.notes||x.details||"")}</td></tr>`);
    (x.breakdown||[]).forEach(b=>rows.push(`<tr><td>└ ${esc(b.item||"")}</td><td>${b.points==null?"—":esc(b.points)+"点"}</td><td>${esc(b.notes||"")}</td></tr>`));
  });
  return `<div class="tscroll"><table class="od-table"><thead><tr><th>評価項目</th><th>配点</th><th>補足</th></tr></thead><tbody>${rows.join("")}</tbody></table></div>`;
}
function odList(label,v){
  if(v==null||v===false||v==="") return "";
  const arr=Array.isArray(v)?v:[v];
  if(!arr.length) return "";
  return `<div class="od-sub">${esc(label)}</div><ul class="od-list">${arr.map(x=>`<li>${esc(typeof x==="string"?x:JSON.stringify(x))}</li>`).join("")}</ul>`;
}
function fmtOfficial(v){ return (v==null||v==="")?"—":esc(v); }
function odDocumentItems(sp){
  const a=[];
  const add=(label,v)=>{
    if(v===null||v===undefined||v===false||v==="")return;
    if(Array.isArray(v)){v.forEach(x=>add(label,x));return;}
    if(typeof v==="string"){a.push(label+"："+v);return;}
    if(typeof v==="object"){
      const t=[];if(v.required===true)t.push("必須");if(v.form)t.push(v.form);if(v.notes)t.push(v.notes);
      a.push(label+"："+(t.join("／")||JSON.stringify(v)));
    }
  };
  (sp.evidenceDocuments||[]).forEach(x=>a.push(x));
  add("学校所定様式",sp.schoolApplicationForm);
  add("志望理由書",sp.statementOfPurpose);
  add("その他",sp.otherDocuments);
  return a;
}
function odRanks(r){
  const ids=r.achievementRankIds||[];
  if(!ids.length) return `<p class="od-empty">学校別の実績ランク表は収録されていません。</p>`;
  return ids.map(id=>{
    const a=ACH_BY_ID[id]; if(!a) return "";
    const rows=a.rows||a.items||[];
    const body=rows.map(x=>{
      const quals=x.qualificationLevels&&typeof x.qualificationLevels==="object"?Object.entries(x.qualificationLevels).map(([k,v])=>`<span class="od-qual">${esc(k)} ${esc(v)}</span>`).join(""):"";
      const meta=[];
      if(x.scope)meta.push("対象範囲："+x.scope);
      if(x.conditions)meta.push("条件："+x.conditions);
      if(x.notes)meta.push("注記："+x.notes);
      return `<tr><td>${esc(x.category||"")}</td><td>${esc(x.activityName||"")}</td><td>${esc(x.rank||"")}${x.points!=null?" "+esc(x.points)+"点":""}</td><td>${esc(x.criteria||x.summary||"")}${quals?`<div>${quals}</div>`:""}${meta.length?`<small class="od-meta">${meta.map(esc).join("<br>")}</small>`:""}</td></tr>`;
    }).join("");
    return `<details class="dx"><summary>${esc(a.schoolName||"")} ${esc(a.referenceYear||"")} 実績・資格評価表</summary><div class="dx-in"><div class="tscroll"><table class="od-table"><thead><tr><th>区分</th><th>活動</th><th>ランク・点</th><th>基準</th></tr></thead><tbody>${body||'<tr><td colspan="4">詳細行なし</td></tr>'}</tbody></table></div>${odList("注意",a.notes)}</div></details>`;
  }).join("");
}
function officialDetailHtml(s){
  const r=ADM[s.id];
  const b=r.basic||{}, g=r.generalSelection||{}, sp=r.specialSelection||{};
  const genTests=[g.interview&&["面接",odTestText(g.interview)],g.essay&&["作文",odTestText(g.essay)],g.shortEssay&&["小論文",odTestText(g.shortEssay)],g.practicalTest&&["実技",odTestText(g.practicalTest)],g.schoolIndependentTest&&["学校独自検査",odTestText(g.schoolIndependentTest)]].filter(Boolean);
  const spTests=[sp.interview&&["面接",odTestText(sp.interview)],sp.essay&&["作文",odTestText(sp.essay)],sp.shortEssay&&["小論文",odTestText(sp.shortEssay)],sp.presentation&&["プレゼン",odTestText(sp.presentation)],sp.practicalTest&&["実技",odTestText(sp.practicalTest)],sp.schoolIndependentTest&&["学校独自検査",odTestText(sp.schoolIndependentTest)]].filter(Boolean);
  const listedTests=(sp.tests||[]).map(x=>`${x.name||"検査"}：${odTestText(x)}`);
  const sf=sp.specialFrame||b.specialFrame||{};
  const sfText=sf.officialText||(!sf.available?"特別枠なし":(sf.applicationCheckRequired?"特別枠あり（希望者に特別な検査あり）":"特別枠あり"));
  let h=`<div class="od-grid">
    <div class="st"><span>課程</span><span class="txt">${fmtOfficial(r.track)}</span></div>
    <div class="st"><span>募集定員</span><span class="txt">${fmtOfficial(b.capacity)}人</span></div>
    <div class="st"><span>特色選抜</span><span class="txt">${fmtOfficial(sp.quotaOfficialText||b.specialQuotaOfficialText)}${sp.quotaNumber!=null?`・最大${esc(sp.quotaNumber)}人`:""}</span></div>
    <div class="st"><span>一般選抜比重</span><span class="txt">${fmtOfficial(g.officialRatio)}</span></div>
  </div>`;
  h+=`<details class="dx" open><summary>一般選抜</summary><div class="dx-in">
    ${g.summary?`<p style="font-size:13.5px"><b>${esc(g.summary)}</b></p>`:""}
    ${g.selectionMethod?`<p style="font-size:13px"><b>選抜方法：</b>${esc(g.selectionMethod)}</p>`:""}
    <p style="font-size:13px"><b>一般選抜の募集人員：</b>${b.generalQuotaNumber!=null?esc(b.generalQuotaNumber)+"人":fmtOfficial(b.generalQuotaFormula)}${b.generalQuotaNumberIfMaxSpecial!=null?`（特色選抜が上限まで合格した場合の目安：${esc(b.generalQuotaNumberIfMaxSpecial)}人）`:""}</p>
    ${genTests.length?`<div class="od-sub">検査</div><ul class="od-list">${genTests.map(x=>`<li><b>${esc(x[0])}</b>：${esc(x[1])}</li>`).join("")}</ul>`:""}
    ${odScoring(g.scoring)}
    ${odList("補足",g.notes)}
  </div></details>`;
  const scoringStatus = sp.scoringPublicationStatus==="not_published" ? `<p class="od-empty"><b>配点：</b>学校別資料で未公表</p>` : (sp.scoringPublicationStatus==="partial"?`<p class="od-empty"><b>配点：</b>一部のみ公表・確認</p>`:"");
  const evidenceStatus = sp.activityEvidenceRequired===true?`<p style="font-size:13px"><b>活動実績等の証明資料：</b>必要</p>`:(sp.activityEvidenceRequired===false?`<p style="font-size:13px"><b>活動実績等の証明資料：</b>不要</p>`:"");
  const sfScoring = Array.isArray(sf.scoring)&&sf.scoring.length?`<div class="od-sub">特別枠専用の配点</div>${odScoring(sf.scoring)}`:"";
  h+=`<details class="dx" open><summary>特色選抜</summary><div class="dx-in">
    ${sp.summary?`<p style="font-size:13.5px"><b>${esc(sp.summary)}</b></p>`:""}
    <p style="font-size:13px"><b>特別枠：</b>${fmtOfficial(sfText)}</p>
    ${sp.selectionMethod?`<p style="font-size:13px"><b>選抜方法：</b>${esc(sp.selectionMethod)}</p>`:""}
    ${odList("特別枠の対象活動",sf.activityFields)}
    ${sfScoring}
    ${odList("出願要件",sp.eligibility)}
    ${odList("追加条件",sp.applicationRequirements)}
    ${odList("求める生徒像",sp.desiredStudentProfile)}
    ${odList("評価する活動・実績",sp.activityFields)}
    ${odList("評価項目",sp.evaluationItems)}
    ${listedTests.length?`<div class="od-sub">検査一覧</div><ul class="od-list">${listedTests.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`:""}
    ${spTests.length?`<div class="od-sub">面接・独自検査の詳細</div><ul class="od-list">${spTests.map(x=>`<li><b>${esc(x[0])}</b>：${esc(x[1])}</li>`).join("")}</ul>`:""}
    ${scoringStatus}${odScoring(sp.scoring)}${evidenceStatus}
    ${odList("提出・証明資料",odDocumentItems(sp))}
    ${odList("補足",sp.notes)}
  </div></details>`;
  h+=`<details class="dx"><summary>実績・資格のランク表</summary><div class="dx-in">${odRanks(r)}</div></details>`;
  h+=`<details class="dx"><summary>第2志望・通学区域</summary><div class="dx-in">
    <p style="font-size:13px"><b>通学区域：</b>${fmtOfficial(b.attendanceArea)}</p>
    ${b.outsideAreaNotes?`<p style="font-size:13px">${esc(b.outsideAreaNotes)}</p>`:""}
    <p style="font-size:13px"><b>第2志望：</b>${b.secondChoice&&b.secondChoice.available?"設定可能":"設定なし／候補なし"}</p>
    ${b.secondChoice&&b.secondChoice.combinations&&b.secondChoice.combinations.length?`<ul class="od-list">${b.secondChoice.combinations.map(x=>`<li>${esc(x.department||"")}${x.course?`（${esc(x.course)}）`:""}${x.track?`・${esc(x.track)}`:""}</li>`).join("")}</ul>`:""}
    ${b.secondChoice&&b.secondChoice.notes?`<p style="font-size:13px">${esc(b.secondChoice.notes)}</p>`:""}
  </div></details>`;
  h+=`<div class="scope-note" style="margin-top:14px">この欄は${esc(r.referenceYear||"前年度")}の学校公式資料を参考として表示しています。次年度の学校別募集要項が公表されたら、必ず最新の公式資料をご確認ください。</div>`;
  return h;
}

/* ---------- ABOUT ---------- */
function renderAbout(view){
  document.title="収録データと出典｜沖縄県立高校入試 学校別データブック";
  const creditRows = IMAGE_CREDITS.map(c=>`<tr>
    <td class="num">${String(c.no).padStart(2,"0")}</td>
